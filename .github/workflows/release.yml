name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build release body
        run: |
          cat > /tmp/release-body.md <<'BODYEOF'
          ## Download

          | Platform | File | Description |
          |----------|------|-------------|
          | Linux (x86_64) | `mock-linux-x86_64.tar.gz` | Static binary, runs on any Linux distro |
          | Windows (x86_64) | `mock-windows-x86_64.zip` | Windows executable |

          ### Quick start

          **Linux**
          ```bash
          tar -xzf mock-linux-x86_64.tar.gz
          ./mock                    # TUI mode
          ./mock --dashboard        # Web dashboard at http://localhost:9999
          ```

          **Windows**
          ```powershell
          # Extract the zip, then:
          .\mock.exe                # TUI mode
          .\mock.exe --dashboard   # Web dashboard at http://localhost:9999
          ```

          ## What's Changed
          BODYEOF

          echo "${{ steps.changelog.outputs.NOTES }}" >> /tmp/release-body.md

          echo "" >> /tmp/release-body.md
          echo "---" >> /tmp/release-body.md
          echo "**Full changelog:** [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)" >> /tmp/release-body.md

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/release-body.md', 'utf8');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `mock-apis ${{ github.ref_name }}`,
              body: body,
              draft: false,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: mock
            archive: mock-linux-x86_64.tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mock.exe
            archive: mock-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} .
          tar -czf ${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          copy target\${{ matrix.target }}\release\${{ matrix.artifact }} .
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ matrix.archive }}

      - name: Upload assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const archiveName = '${{ matrix.archive }}';
            const data = fs.readFileSync(archiveName);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: archiveName,
              data: data,
            });
